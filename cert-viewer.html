<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>철재방화셔터 인정서 | (주)경원에스아이</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <style>
    :root { --primary: #1e40af; --text: #111827; --text-muted: #6b7280; --border: #e5e7eb; }
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-user-select: none; -moz-user-select: none; -ms-user-select: none; user-select: none; -webkit-touch-callout: none; }
    html, body { height: 100%; }
    body { background: #2a2d34; font-family: 'Pretendard', -apple-system, sans-serif; display: flex; flex-direction: column; min-height: 100vh; }

    .viewer-header {
      position: sticky; top: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 24px; background: rgba(17, 24, 39, 0.96); backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .viewer-title { display: flex; align-items: center; gap: 12px; color: white; font-size: 15px; font-weight: 700; }
    .viewer-title .badge { padding: 4px 10px; background: var(--primary); border-radius: 6px; font-size: 11px; font-weight: 700; letter-spacing: 0.05em; }
    .viewer-back { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 14px; font-weight: 600; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; transition: all 0.2s; }
    .viewer-back:hover { background: rgba(255,255,255,0.1); color: white; }

    .cert-stage { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 32px 16px 64px; overflow: auto; }
    .cert-frame { position: relative; max-width: 900px; width: 100%; }

    /* 인정서: background-image로 표시 (img 태그 우회 저장 방지) + 투명 오버레이로 우클릭/드래그 차단 */
    .cert-image {
      width: 100%; aspect-ratio: 1 / 1.414;  /* A4 비율, 실제 이미지에 맞게 자동 조정됨 */
      background-image: url('images/cert-fire-shutter.png');
      background-size: contain; background-position: top center; background-repeat: no-repeat;
      background-color: white; border-radius: 8px; box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .cert-guard { position: absolute; inset: 0; z-index: 5; background: transparent; }

    /* 워터마크 */
    .cert-watermark {
      position: absolute; inset: 0; z-index: 4; pointer-events: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; font-weight: 800; color: rgba(30, 64, 175, 0.06);
      transform: rotate(-24deg); letter-spacing: 0.1em; white-space: nowrap;
    }

    .cert-notice { text-align: center; color: rgba(255,255,255,0.55); font-size: 13px; margin-top: 24px; line-height: 1.7; }

    /* 인쇄 차단 */
    @media print {
      body * { display: none !important; visibility: hidden !important; }
      body::after { content: "본 인정서는 인쇄할 수 없습니다."; visibility: visible; display: block; font-size: 18px; padding: 40px; }
    }

    @media (max-width: 600px) {
      .viewer-header { padding: 12px 16px; }
      .viewer-title { font-size: 13px; }
      .cert-watermark { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="viewer-header">
    <div class="viewer-title">
      <span class="badge">인정서</span>
      철재방화셔터 인정서
    </div>
    <a href="product-fire-shutter.html" class="viewer-back">← 돌아가기</a>
  </div>

  <div class="cert-stage">
    <div class="cert-frame">
      <div class="cert-image"></div>
      <div class="cert-watermark">(주)경원에스아이 · 열람용</div>
      <div class="cert-guard"></div>
    </div>
  </div>

  <p class="cert-notice">※ 본 인정서는 열람 전용이며, 무단 복제·배포·인쇄를 금합니다.<br>인정서 사본이 필요하신 경우 담당자에게 문의해 주세요.</p>

  <script>
    // 우클릭 차단
    document.addEventListener('contextmenu', function(e) { e.preventDefault(); return false; });
    // 드래그 차단
    document.addEventListener('dragstart', function(e) { e.preventDefault(); return false; });
    // 키보드 단축키 차단 (저장/인쇄/복사/소스보기)
    document.addEventListener('keydown', function(e) {
      var k = e.key.toLowerCase();
      if ((e.ctrlKey || e.metaKey) && (k === 's' || k === 'p' || k === 'c' || k === 'u')) {
        e.preventDefault(); return false;
      }
      // 개발자도구 단축키 (F12, Ctrl+Shift+I/J)
      if (e.key === 'F12' || ((e.ctrlKey || e.metaKey) && e.shiftKey && (k === 'i' || k === 'j'))) {
        e.preventDefault(); return false;
      }
    });
    // 인쇄 시도 차단 (Ctrl+P 외 메뉴 인쇄)
    window.addEventListener('beforeprint', function() { document.body.style.display = 'none'; });
    window.addEventListener('afterprint', function() { document.body.style.display = 'flex'; });
  </script>
</body>
</html>
